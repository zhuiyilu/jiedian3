name: 自动聚合 + 测速 + 筛选最佳节点

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 安装依赖和测速工具
        run: |
          sudo apt-get update -qq
          pip install requests pyyaml --user || true

          echo "正在下载 LiteSpeedTest..."
          wget -q https://github.com/xxf098/LiteSpeedTest/releases/download/v0.15.0/lite-linux-amd64-v3-v0.15.0.gz -O litespeedtest.gz || \
          wget -q https://github.com/xxf098/LiteSpeedTest/releases/download/v0.15.0/lite-linux-amd64-v0.15.0.gz -O litespeedtest.gz
          
          gunzip -f litespeedtest.gz || echo "解压失败"
          if [ -f lite-linux-amd64-v3-v0.15.0 ]; then
            mv lite-linux-amd64-v3-v0.15.0 litespeedtest
          elif [ -f lite-linux-amd64-v0.15.0 ]; then
            mv lite-linux-amd64-v0.15.0 litespeedtest
          fi
          chmod +x litespeedtest 2>/dev/null || true

      - name: 下载并安装 Subconverter
        run: |
          echo "正在下载 subconverter..."
          wget -q https://github.com/tindy2013/subconverter/releases/latest/download/subconverter_linux64.tar.gz
          tar -xzf subconverter_linux64.tar.gz
          chmod +x subconverter/subconverter

      - name: 聚合 + 测速 + 生成订阅
        env:
          SUBS_URLS: ${{ secrets.SUBS_URLS }}
        run: |
          cat << 'EOF' > main.py
          import os, base64, urllib.request, json, time, re

          def fetch_url(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=50) as r:
                      return r.read()
              except Exception as e:
                  print(f"❌ 获取失败: {url} | {e}")
                  return None

          def decode_content(data):
              if not data: return ""
              text = data.decode('utf-8', errors='ignore').strip()
              if '://' not in text[:200]:
                  try:
                      return base64.b64decode(text + '===').decode('utf-8', errors='ignore')
                  except: pass
              return text

          urls = [u.strip() for u in os.getenv('SUBS_URLS', '').splitlines() if u.strip()]
          all_nodes = []
          print(f"发现 {len(urls)} 个订阅链接\n")

          for i, url in enumerate(urls, 1):
              print(f"[{i}/{len(urls)}] 获取: {url[:70]}...")
              raw = fetch_url(url)
              if raw:
                  content = decode_content(raw)
                  nodes = [line.strip() for line in content.splitlines() 
                           if line.strip() and re.match(r'^(vmess|vless|trojan|ss|hysteria2|tuic|ssr)://', line.strip())]
                  all_nodes.extend(nodes)
                  print(f" → 获得 {len(nodes)} 个节点")

          unique_nodes = list(dict.fromkeys(all_nodes))
          print(f"\n✅ 去重后共 {len(unique_nodes)} 个节点")

          # 限制全节点文件体积（最高取前5000个），防止超过GitHub 50MB限制
          with open('all_nodes.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(unique_nodes[:5000]))

          # 从中抽取前 1500 个节点参与测速（25万个不可能测得完）
          test_nodes = unique_nodes[:1500]
          with open('test_nodes.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(test_nodes))

          # 默认兜底节点
          best_nodes = unique_nodes[:100]

          if len(unique_nodes) > 5 and os.path.exists('litespeedtest'):
              print("\n🚀 开始测速...")
              try:
                  # 修正新版 LiteSpeedTest 的命令行参数：使用 --test
                  os.system('./litespeedtest --test test_nodes.txt --headless > /dev/null 2>&1')
                  time.sleep(5)
                  
                  # 查找生成的 json 报告（新版名字可能带时间戳，进行模糊搜索）
                  json_files = [f for f in os.listdir('.') if f.endswith('.json') and f != 'package.json']
                  if json_files:
                      report_file = json_files[0]
                      with open(report_file, encoding='utf-8') as f:
                          data = json.load(f)
                      # 过滤并排序
                      sorted_nodes = sorted([n for n in data if float(n.get('delay', 9999)) < 800], key=lambda x: float(x.get('delay', 9999)))
                      if sorted_nodes:
                          best_nodes = [n['link'] for n in sorted_nodes[:120]]
                          print(f"✅ 测速成功，筛选出 {len(best_nodes)} 个优质节点")
                  else:
                      print("⚠️ 未找到测速 json 报告，使用默认前100个节点垫底")
              except Exception as e:
                  print(f"测速异常: {e}，使用默认节点垫底")

          combined = '\n'.join(best_nodes)
          with open('sub.txt', 'w', encoding='utf-8') as f:
              f.write(base64.b64encode(combined.encode()).decode())
          with open('sub_plain.txt', 'w', encoding='utf-8') as f:
              f.write(combined)
          print("🎉 sub_plain.txt 和 sub.txt 筛选写入完成！")
          EOF

          # 执行 Python 主文件
          python3 main.py

          # 执行标准的客户端配置文件转换
          if [ -f sub_plain.txt ] && [ -s sub_plain.txt ]; then
            echo "正在使用 subconverter 转换 clash.yaml..."
            ./subconverter/subconverter -g --source sub_plain.txt --target clash --output clash.yaml
          else
            echo "错误：未发现有效的节点数据"
          fi

      - name: 提交更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 移除了大体积的临时的 test_nodes.txt，只保留需要的成果
          git add sub.txt sub_plain.txt clash.yaml all_nodes.txt
          if git diff --cached --quiet; then
            echo "没有新变化"
          else
            git commit -m "Auto update Best 100 nodes $(date '+%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "✅ 推送成功！"
          fi
