name: 自动聚合 + 测速 + 筛选最佳节点

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *'   # 每8小时运行一次

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 安装依赖和 LiteSpeedTest
        run: |
          sudo apt-get update -qq
          pip install requests --user || true
          
          echo "正在下载 LiteSpeedTest..."
          wget -q https://github.com/xxf098/LiteSpeedTest/releases/download/v0.15.0/lite-linux-amd64-v3-v0.15.0.gz -O litespeedtest.gz || \
          wget -q https://github.com/xxf098/LiteSpeedTest/releases/download/v0.15.0/lite-linux-amd64-v0.15.0.gz -O litespeedtest.gz
          
          gunzip -f litespeedtest.gz || echo "解压失败"
          if [ -f lite-linux-amd64-v3-v0.15.0 ]; then
            mv lite-linux-amd64-v3-v0.15.0 litespeedtest
          elif [ -f lite-linux-amd64-v0.15.0 ]; then
            mv lite-linux-amd64-v0.15.0 litespeedtest
          fi
          chmod +x litespeedtest 2>/dev/null || true

      - name: 聚合 + 测速 + 生成订阅
        env:
          SUBS_URLS: ${{ secrets.SUBS_URLS }}
        run: |
          cat << 'EOF' > main.py
          import os, base64, urllib.request, json, time, yaml

          def fetch_url(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=50) as r:
                      return r.read()
              except Exception as e:
                  print(f"❌ 获取失败: {url} | {e}")
                  return None

          def decode_content(data):
              if not data: return ""
              text = data.decode('utf-8', errors='ignore').strip()
              if '://' not in text[:200]:
                  try:
                      return base64.b64decode(text + '===').decode('utf-8')
                  except: pass
              return text

          # ==================== 主逻辑 ====================
          urls = [u.strip() for u in os.getenv('SUBS_URLS', '').splitlines() if u.strip()]
          all_nodes = []
          node_count = {}

          print(f"发现 {len(urls)} 个订阅链接\n")
          for i, url in enumerate(urls, 1):
              print(f"[{i}/{len(urls)}] 正在获取: {url[:60]}...")
              raw = fetch_url(url)
              if raw:
                  content = decode_content(raw)
                  nodes = [line.strip() for line in content.splitlines() 
                           if line.strip() and any(line.strip().startswith(p) 
                           for p in ['vmess://','vless://','trojan://','ss://','hysteria2://','tuic://','ssr://'])]
                  all_nodes.extend(nodes)
                  node_count[url] = len(nodes)
                  print(f" → 获取到 **{len(nodes)}** 个节点")

          unique_nodes = list(dict.fromkeys(all_nodes))
          print(f"\n✅ 总聚合去重后: {len(unique_nodes)} 个节点")

          # 保存所有节点
          with open('all_nodes.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(unique_nodes))

          best_nodes = unique_nodes[:150]  # 先多取一些用于测速

          # ==================== 测速 ====================
          if len(unique_nodes) > 10 and os.path.exists('litespeedtest'):
              print("\n🚀 开始测速 (LiteSpeedTest)...")
              try:
                  os.system('./litespeedtest -c all_nodes.txt -t 25 -o result.json --speedtest 0 > /dev/null 2>&1')
                  time.sleep(8)

                  if os.path.exists('result.json'):
                      with open('result.json', encoding='utf-8') as f:
                          data = json.load(f)
                      
                      # 按延迟排序 + 过滤超时
                      sorted_nodes = sorted(
                          [n for n in data if float(n.get('delay', 9999)) < 800],
                          key=lambda x: float(x.get('delay', 9999))
                      )
                      best_nodes = [n['link'] for n in sorted_nodes[:100]]
                      print(f"✅ 测速完成，筛选出 {len(best_nodes)} 个优质节点")
                  else:
                      print("⚠️ 测速结果文件未生成，使用前100个节点")
              except Exception as e:
                  print(f"⚠️ 测速异常: {e}，使用前100个节点")
          else:
              print("节点较少或测速工具不可用，直接使用前100个节点")

          # ==================== 生成订阅 ====================
          combined = '\n'.join(best_nodes)

          # V2Ray 订阅 (base64)
          encoded = base64.b64encode(combined.encode('utf-8')).decode('utf-8')
          with open('sub.txt', 'w', encoding='utf-8') as f:
              f.write(encoded)

          # Clash 订阅
          clash_config = {
              'mixed-port': 7890,
              'allow-lan': True,
              'mode': 'rule',
              'log-level': 'info',
              'proxies': [],
              'proxy-groups': [
                  {
                      'name': '自动选择',
                      'type': 'url-test',
                      'url': 'http://www.gstatic.com/generate_204',
                      'interval': 300,
                      'tolerance': 50,
                      'proxies': []
                  },
                  {
                      'name': '负载均衡',
                      'type': 'load-balance',
                      'strategy': 'consistent-hashing',
                      'proxies': []
                  }
              ],
              'rules': [
                  'MATCH,自动选择'
              ]
          }

          for link in best_nodes:
              # 简单构造 proxy 对象（实际生产中建议使用更完整的解析库，这里用基础版）
              name = f"Node-{len(clash_config['proxies'])+1}"
              clash_config['proxies'].append({
                  'name': name,
                  'type': link.split('://')[0],
                  'server': 'placeholder',   # LiteSpeedTest 已解析，这里简化
                  'port': 443,
                  # 其他字段可后续扩展
              })
              clash_config['proxy-groups'][0]['proxies'].append(name)
              clash_config['proxy-groups'][1]['proxies'].append(name)

          with open('clash.yaml', 'w', encoding='utf-8') as f:
             
