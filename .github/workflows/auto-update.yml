name: 自动聚合 + 测速 + 筛选最佳100

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 安装依赖和测速工具
        run: |
          sudo apt-get update -qq
          pip install requests --user
          echo "下载 LiteSpeedTest..."
          wget -q https://github.com/xxf098/LiteSpeedTest/releases/download/v0.15.0/lite-linux-amd64-v3-v0.15.0.gz -O litespeedtest.gz
          gunzip litespeedtest.gz
          mv lite-linux-amd64-v3-v0.15.0 litespeedtest
          chmod +x litespeedtest
          ./litespeedtest --version || echo "版本检查完成"

      - name: 聚合 + 测速 + 筛选最佳100节点
        env:
          SUBS_URLS: ${{ secrets.SUBS_URLS }}
        run: |
          cat << 'EOF' > main.py
          import os, base64, urllib.request, json

          def fetch_url(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=40) as r:
                      return r.read()
              except Exception as e:
                  print(f"❌ 获取失败: {url} | {e}")
                  return None

          def decode_content(data):
              if not data: return ""
              text = data.decode('utf-8', errors='ignore').strip()
              if '://' not in text[:150]:
                  try:
                      return base64.b64decode(text + '===').decode('utf-8')
                  except: pass
              return text

          urls = [u.strip() for u in os.getenv('SUBS_URLS', '').splitlines() if u.strip()]
          all_nodes = []
          node_count = {}

          print(f"发现 {len(urls)} 个订阅链接\n")

          for i, url in enumerate(urls, 1):
              print(f"[{i}/{len(urls)}] 正在获取: {url}")
              raw = fetch_url(url)
              if raw:
                  content = decode_content(raw)
                  nodes = [line.strip() for line in content.splitlines() 
                          if line.strip() and any(line.strip().startswith(p) 
                          for p in ['vmess://','vless://','trojan://','ss://','hysteria2://','tuic://'])]
                  all_nodes.extend(nodes)
                  node_count[url] = len(nodes)
                  print(f"   → 获取到 {len(nodes)} 个节点")

          # 去重
          unique_nodes = list(dict.fromkeys(all_nodes))
          print(f"\n✅ 总共聚合去重后: {len(unique_nodes)} 个节点")

          print("\n各订阅贡献节点数:")
          for url, cnt in node_count.items():
              print(f"   • {cnt} 个  ←  {url}")

          # 保存所有节点
          with open('all_nodes.txt', 'w') as f:
              f.write('\n'.join(unique_nodes))

          best_nodes = unique_nodes[:100]  # 默认先取前100

          # 尝试测速
          if len(unique_nodes) > 5:
              print("\n🚀 开始测速（可能需要几分钟）...")
              try:
                  os.system('./litespeedtest -c all_nodes.txt -t 25 -o result.json --speedtest 0 > speed.log 2>&1')
                  if os.path.exists('result.json'):
                      with open('result.json') as f:
                          data = json.load(f)
                      # 按延迟排序
                      sorted_data = sorted(data, key=lambda x: float(x.get('delay', 9999)))
                      best_nodes = [item['link'] for item in sorted_data[:100] if float(item.get('delay', 9999)) < 800]
                      print(f"✅ 测速完成，筛选出 {len(best_nodes)} 个优质节点")
                  else:
                      print("测速结果文件未生成，使用前100个节点")
              except Exception as e:
                  print(f"测速异常: {e}，使用前100个节点")

          # 生成订阅文件
          combined = '\n'.join(best_nodes)
          encoded = base64.b64encode(combined.encode('utf-8')).decode('utf-8')

          with open('sub.txt', 'w') as f:
              f.write(encoded)
          with open('sub_plain.txt', 'w') as f:
              f.write(combined)

          print(f"✅ 最终生成 {len(best_nodes)} 个最佳节点")
          EOF

          python3 main.py

      - name: 提交更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if [ -f sub.txt ]; then
            git add sub.txt sub_plain.txt
            if git diff --cached --quiet; then
              echo "没有变化，跳过提交"
            else
              git commit -m "Auto update + speedtest - Best 100 nodes $(date '+%Y-%m-%d %H:%M:%S UTC')"
              git push
              echo "✅ 成功推送！"
            fi
          else
            echo "❌ 未生成 sub.txt"
          fi
