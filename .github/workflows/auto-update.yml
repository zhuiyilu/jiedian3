name: 自动聚合 + 测速 + 筛选最佳100节点

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *'   # 每8小时运行

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 安装依赖并下载测速工具
        run: |
          sudo apt-get update
          pip install requests
          wget -q https://github.com/xxf098/LiteSpeedTest/releases/latest/download/litespeedtest-linux-amd64.tar.gz -O litespeedtest.tar.gz
          tar -xzf litespeedtest.tar.gz
          chmod +x litespeedtest
          ./litespeedtest --version

      - name: 聚合 + 测速 + 筛选
        env:
          SUBS_URLS: ${{ secrets.SUBS_URLS }}
        run: |
          cat << 'EOF' > main.py
          import os, base64, urllib.request, json, time

          def fetch_url(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=40) as r:
                      return r.read()
              except Exception as e:
                  print(f"❌ 获取失败: {url} | {e}")
                  return None

          def decode_content(data):
              if not data: return ""
              text = data.decode('utf-8', errors='ignore').strip()
              if '://' not in text[:150]:
                  try:
                      return base64.b64decode(text + '===').decode('utf-8')
                  except: pass
              return text

          # 主程序
          urls = [u.strip() for u in os.getenv('SUBS_URLS', '').splitlines() if u.strip()]
          all_nodes = []
          node_count_per_sub = {}

          print(f"发现 {len(urls)} 个订阅链接\n")

          for i, url in enumerate(urls, 1):
              print(f"[{i}/{len(urls)}] 正在获取: {url}")
              raw = fetch_url(url)
              if raw:
                  content = decode_content(raw)
                  nodes = []
                  for line in content.splitlines():
                      line = line.strip()
                      if any(line.startswith(p) for p in ['vmess://','vless://','trojan://','ss://','hysteria2://','tuic://']):
                          nodes.append(line)
                  all_nodes.extend(nodes)
                  node_count_per_sub[url] = len(nodes)
                  print(f"   → 获取到 {len(nodes)} 个节点")

          # 去重（保持出现顺序）
          unique_nodes = list(dict.fromkeys(all_nodes))
          print(f"\n✅ 聚合完成，总去重后 {len(unique_nodes)} 个节点")

          # 显示每个订阅贡献数量
          print("\n各订阅贡献节点数量：")
          for url, count in node_count_per_sub.items():
              print(f"   • {count} 个 ← {url}")

          # 保存所有节点用于测速
          with open('all_nodes.txt', 'w') as f:
              f.write('\n'.
