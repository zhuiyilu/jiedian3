name: 自动聚合 + 测速 + 筛选最佳节点

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 安装依赖和测速工具
        run: |
          sudo apt-get update -qq
          pip install requests pyyaml --user || true

          echo "正在下载 LiteSpeedTest..."
          wget -q https://github.com/xxf098/LiteSpeedTest/releases/download/v0.15.0/lite-linux-amd64-v3-v0.15.0.gz -O litespeedtest.gz || \
          wget -q https://github.com/xxf098/LiteSpeedTest/releases/download/v0.15.0/lite-linux-amd64-v0.15.0.gz -O litespeedtest.gz
          
          gunzip -f litespeedtest.gz || echo "解压失败"
          if [ -f lite-linux-amd64-v3-v0.15.0 ]; then
            mv lite-linux-amd64-v3-v0.15.0 litespeedtest
          elif [ -f lite-linux-amd64-v0.15.0 ]; then
            mv lite-linux-amd64-v0.15.0 litespeedtest
          fi
          chmod +x litespeedtest 2>/dev/null || true

      - name: 下载并安装 Subconverter (用于生成合规的 Clash 配置)
        run: |
          echo "正在下载 subconverter..."
          wget -q https://github.com/tindy2013/subconverter/releases/latest/download/subconverter_linux64.tar.gz
          tar -xzf subconverter_linux64.tar.gz
          chmod +x subconverter/subconverter

      - name: 聚合 + 测速 + 生成订阅
        env:
          SUBS_URLS: ${{ secrets.SUBS_URLS }}
          REPO_NAME: ${{ github.repository }}
        run: |
          cat << 'EOF' > main.py
          import os, base64, urllib.request, json, time, re

          def fetch_url(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=50) as r:
                      return r.read()
              except Exception as e:
                  print(f"❌ 获取失败: {url} | {e}")
                  return None

          def decode_content(data):
              if not data: return ""
              text = data.decode('utf-8', errors='ignore').strip()
              if '://' not in text[:200]:
                  try:
                      return base64.b64decode(text + '===').decode('utf-8', errors='ignore')
                  except: pass
              return text

          urls = [u.strip() for u in os.getenv('SUBS_URLS', '').splitlines() if u.strip()]
          all_nodes = []
          print(f"发现 {len(urls)} 个订阅链接\n")

          for i, url in enumerate(urls, 1):
              print(f"[{i}/{len(urls)}] 获取: {url[:70]}...")
              raw = fetch_url(url)
              if raw:
                  content = decode_content(raw)
                  nodes = [line.strip() for line in content.splitlines() 
                           if line.strip() and re.match(r'^(vmess|vless|trojan|ss|hysteria2|tuic|ssr)://', line.strip())]
                  all_nodes.extend(nodes)
                  print(f" → 获得 {len(nodes)} 个节点")

          unique_nodes = list(dict.fromkeys(all_nodes))
          print(f"\n✅ 去重后共 {len(unique_nodes)} 个节点")

          with open('all_nodes.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(unique_nodes))

          best_nodes = unique_nodes[:150]

          if len(unique_nodes) > 8 and os.path.exists('litespeedtest'):
              print("\n🚀 开始测速...")
              try:
                  os.system('./litespeedtest -c all_nodes.txt -t 20 -o result.json --speedtest 0 > /dev/null
