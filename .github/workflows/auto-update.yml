name: 自动聚合 + 测速 + 筛选最佳节点

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *'   # 每8小时自动更新

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 安装依赖和测速工具
        run: |
          sudo apt-get update -qq
          pip install requests pyyaml --user || true

          echo "正在下载 LiteSpeedTest..."
          wget -q https://github.com/xxf098/LiteSpeedTest/releases/download/v0.15.0/lite-linux-amd64-v3-v0.15.0.gz -O litespeedtest.gz || \
          wget -q https://github.com/xxf098/LiteSpeedTest/releases/download/v0.15.0/lite-linux-amd64-v0.15.0.gz -O litespeedtest.gz
          
          gunzip -f litespeedtest.gz || echo "解压失败"
          if [ -f lite-linux-amd64-v3-v0.15.0 ]; then
            mv lite-linux-amd64-v3-v0.15.0 litespeedtest
          elif [ -f lite-linux-amd64-v0.15.0 ]; then
            mv lite-linux-amd64-v0.15.0 litespeedtest
          fi
          chmod +x litespeedtest 2>/dev/null || true

      - name: 聚合 + 测速 + 生成订阅
        env:
          SUBS_URLS: ${{ secrets.SUBS_URLS }}
          REPO_NAME: ${{ github.repository }}
        run: |
          cat << 'EOF' > main.py
          import os, base64, urllib.request, json, time, yaml, re

          def fetch_url(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=50) as r:
                      return r.read()
              except Exception as e:
                  print(f"❌ 获取失败: {url} | {e}")
                  return None

          def decode_content(data):
              if not data: return ""
              text = data.decode('utf-8', errors='ignore').strip()
              if '://' not in text[:200]:
                  try:
                      return base64.b64decode(text + '===').decode('utf-8', errors='ignore')
                  except: pass
              return text

          # ==================== 主逻辑 ====================
          urls = [u.strip() for u in os.getenv('SUBS_URLS', '').splitlines() if u.strip()]
          all_nodes = []
          print(f"发现 {len(urls)} 个订阅链接\n")

          for i, url in enumerate(urls, 1):
              print(f"[{i}/{len(urls)}] 获取: {url[:70]}...")
              raw = fetch_url(url)
              if raw:
                  content = decode_content(raw)
                  nodes = [line.strip() for line in content.splitlines() 
                           if line.strip() and re.match(r'^(vmess|vless|trojan|ss|hysteria2|tuic|ssr)://', line.strip())]
                  all_nodes.extend(nodes)
                  print(f" → 获得 {len(nodes)} 个节点")

          unique_nodes = list(dict.fromkeys(all_nodes))
          print(f"\n✅ 去重后共 {len(unique_nodes)} 个节点")

          with open('all_nodes.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(unique_nodes))

          best_nodes = unique_nodes[:150]

          # ==================== 测速 ====================
          if len(unique_nodes) > 8 and os.path.exists('litespeedtest'):
              print("\n🚀 开始测速...")
              try:
                  os.system('./litespeedtest -c all_nodes.txt -t 20 -o result.json --speedtest 0 > /dev/null 2>&1')
                  time.sleep(8)
                  if os.path.exists('result.json'):
                      with open('result.json', encoding='utf-8') as f:
                          data = json.load(f)
                      sorted_nodes = sorted(
                          [n for n in data if float(n.get('delay', 9999)) < 750],
                          key=lambda x: float(x.get('delay', 9999))
                      )
                      best_nodes = [n['link'] for n in sorted_nodes[:100]]
                      print(f"✅ 测速成功，筛选出 {len(best_nodes)} 个优质节点")
                  else:
                      print("⚠️ 测速未生成结果，使用前100个节点")
              except Exception as e:
                  print(f"⚠️ 测速异常: {e}，使用前100个节点")
          else:
              print("节点较少或测速工具不可用，使用前100个节点")

          # ==================== 生成订阅 ====================
          combined = '\n'.join(best_nodes)

          # V2Ray / Sing-box 订阅
          with open('sub.txt', 'w', encoding='utf-8') as f:
              f.write(base64.b64encode(combined.encode()).decode())

          with open('sub_plain.txt', 'w', encoding='utf-8') as f:
              f.write(combined)

          # Clash 订阅 - Proxy Provider（最稳定方式）
          repo = os.getenv('REPO_NAME', 'jiedian3/jiedian3')
          sub_url = f"https://raw.githubusercontent.com/{repo}/main/sub.txt"

          clash_config = {
              'mixed-port': 7890,
              'allow-lan': True,
              'mode': 'rule',
              'log-level': 'warning',
              'ipv6': False,
              'proxies': [],
              'proxy-providers': {
                  'AutoNodes': {
                      'type': 'http',
                      'url': sub_url,
                      'interval': 3600,
                      'health-check': {
                          'enable': True,
                          'url': 'http://www.gstatic.com/generate_204',
                          'interval': 300
                      }
                  }
              },
              'proxy-groups': [
                  {
                      'name': '♻️ 自动选择',
                      'type': 'url-test',
                      'use': ['AutoNodes'],
                      'url': 'http://www.gstatic.com/generate_204',
                      'interval': 300,
                      'tolerance': 50
                  },
                  {
                      'name': '🔄 手动选择',
                      'type': 'select',
                      'use': ['AutoNodes']
                  }
              ],
              'rules': [
                  'MATCH,♻️ 自动选择'
              ]
          }

          with open('clash.yaml', 'w', encoding='utf-8') as f:
              yaml.dump(clash_config, f, allow_unicode=True, sort_keys=False, default_flow_style=False)

          print(f"🎉 生成完成！共 {len(best_nodes)} 个节点")
          print(f"   📄 Clash 订阅地址: {sub_url.replace('/sub.txt', '/clash.yaml')}")
          EOF

          python3 main.py

      - name: 提交更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add sub.txt sub_plain.txt clash.yaml all_nodes.txt
          
          if git diff --cached --quiet; then
            echo "没有新变化"
          else
            git commit -m "Auto update Best 100 nodes $(date '+%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "✅ 推送成功！"
          fi
