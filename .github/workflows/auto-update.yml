name: 自动聚合 + 测速 + 筛选最佳100

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 安装依赖
        run: |
          pip install --quiet --break-system-packages pyyaml || pip install --quiet pyyaml

      - name: 聚合 + 测速 + 筛选 + 生成订阅
        env:
          SUBS_URLS: ${{ secrets.SUBS_URLS }}
        run: |
          cat << 'EOF' > main.py
          import os, base64, json, time, socket, random, asyncio
          import urllib.request
          from urllib.parse import urlparse, unquote, parse_qs
          from concurrent.futures import ThreadPoolExecutor
          import yaml

          # ---------- 调优参数 ----------
          MAX_CONCURRENCY = 500      # 同时测速的并发连接数
          CONNECT_TIMEOUT = 1.5      # 单个节点连接超时（秒）
          MAX_UNIQUE_TO_TEST = 8000  # 唯一 host:port 超过这个数就随机抽样测速
          TOP_N = 100                # 最终输出节点数

          # ---------- 基础工具 ----------

          def fetch_url(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=40) as r:
                      return r.read()
              except Exception as e:
                  print(f"❌ 获取失败: {url} | {e}")
                  return None

          def decode_content(data):
              if not data:
                  return ""
              text = data.decode('utf-8', errors='ignore').strip()
              if '://' not in text[:200]:
                  try:
                      return base64.b64decode(text + '===').decode('utf-8')
                  except Exception:
                      pass
              return text

          def b64_pad_decode(s):
              s = s.strip().replace('-', '+').replace('_', '/')
              return base64.b64decode(s + '=' * (-len(s) % 4))

          # ---------- 解析 host/port，用于测速分组去重 ----------

          def get_host_port(link):
              try:
                  if link.startswith('vmess://'):
                      raw = b64_pad_decode(link[len('vmess://'):])
                      info = json.loads(raw.decode('utf-8', errors='ignore'))
                      return info.get('add'), int(info.get('port'))
                  parsed = urlparse(link)
                  if parsed.hostname and parsed.port:
                      return parsed.hostname, parsed.port
                  if link.startswith('ss://'):
                      body = link[len('ss://'):].split('#')[0]
                      decoded = b64_pad_decode(body).decode('utf-8', errors='ignore')
                      if '@' in decoded:
                          hostport = decoded.rsplit('@', 1)[-1]
                          host, port = hostport.split(':')
                          return host, int(port)
              except Exception:
                  pass
              return None, None

          # ---------- asyncio 并发 TCP 测速 ----------

          async def tcp_ping_async(host, port, sem, timeout=CONNECT_TIMEOUT):
              async with sem:
                  start = time.time()
                  try:
                      fut = asyncio.open_connection(host, port)
                      reader, writer = await asyncio.wait_for(fut, timeout=timeout)
                      delay = round((time.time() - start) * 1000, 1)
                      writer.close()
                      try:
                          await writer.wait_closed()
                      except Exception:
                          pass
                      return delay
                  except Exception:
                      return None

          async def test_all(host_port_list):
              sem = asyncio.Semaphore(MAX_CONCURRENCY)
              tasks = [tcp_ping_async(h, p, sem) for h, p in host_port_list]
              results = []
              total = len(tasks)
              done = 0
              CHUNK = 500
              for i in range(0, total, CHUNK):
                  batch = tasks[i:i + CHUNK]
                  batch_results = await asyncio.gather(*batch)
                  results.extend(batch_results)
                  done += len(batch)
                  print(f"   进度 {done}/{total}")
              return results

          # ---------- 节点链接 -> Clash 代理字典 ----------

          def safe_name(name, used_names):
              name = (name or "").strip() or "节点"
              base, i = name, 2
              while name in used_names:
                  name = f"{base}-{i}"
                  i += 1
              used_names.add(name)
              return name

          def parse_uri_style(link):
              parsed = urlparse(link)
              query = {k: v[0] for k, v in parse_qs(parsed.query).items()}
              frag = unquote(parsed.fragment) if parsed.fragment else ''
              return parsed, query, frag

          def vmess_to_proxy(link, used_names):
              try:
                  raw = b64_pad_decode(link[len('vmess://'):])
                  info = json.loads(raw.decode('utf-8', errors='ignore'))
                  name = safe_name(unquote(str(info.get('ps', 'vmess'))), used_names)
                  proxy = {
                      'name': name, 'type': 'vmess',
                      'server': info.get('add'), 'port': int(info.get('port')),
                      'uuid': info.get('id'), 'alterId': int(info.get('aid', 0) or 0),
                      'cipher': info.get('scy') or 'auto', 'udp': True,
                  }
                  net = info.get('net', 'tcp')
                  if net and net != 'tcp':
                      proxy['network'] = net
                  if info.get('tls') in ('tls', 'reality'):
                      proxy['tls'] = True
                      if info.get('sni'):
                          proxy['servername'] = info.get('sni')
                  if net == 'ws':
                      proxy['ws-opts'] = {'path': info.get('path') or '/',
                                           'headers': {'Host': info.get('host')} if info.get('host') else {}}
                  elif net == 'grpc':
                      proxy['grpc-opts'] = {'grpc-service-name': info.get('path') or ''}
                  return proxy
              except Exception:
                  return None

          def vless_to_proxy(link, used_names):
              try:
                  parsed, q, frag = parse_uri_style(link)
                  if not (parsed.hostname and parsed.port and parsed.username):
                      return None
                  name = safe_name(frag or 'vless', used_names)
                  proxy = {'name': name, 'type': 'vless', 'server': parsed.hostname,
                            'port': parsed.port, 'uuid': parsed.username, 'udp': True}
                  net = q.get('type', 'tcp')
                  if net and net != 'tcp':
                      proxy['network'] = net
                  security = q.get('security', 'none')
                  if security in ('tls', 'reality'):
                      proxy['tls'] = True
                      if q.get('sni'):
                          proxy['servername'] = q.get('sni')
                      if q.get('fp'):
                          proxy['client-fingerprint'] = q.get('fp')
                      if security == 'reality':
                          proxy['reality-opts'] = {'public-key': q.get('pbk', ''), 'short-id': q.get('sid', '')}
                  if q.get('flow'):
                      proxy['flow'] = q.get('flow')
                  if net == 'ws':
                      proxy['ws-opts'] = {'path': unquote(q.get('path', '/')),
                                           'headers': {'Host': q.get('host')} if q.get('host') else {}}
                  elif net == 'grpc':
                      proxy['grpc-opts'] = {'grpc-service-name': q.get('serviceName', '')}
                  return proxy
              except Exception:
                  return None

          def trojan_to_proxy(link, used_names):
              try:
                  parsed, q, frag = parse_uri_style(link)
                  if not (parsed.hostname and parsed.port and parsed.username):
                      return None
                  name = safe_name(frag or 'trojan', used_names)
                  proxy = {'name': name, 'type': 'trojan', 'server': parsed.hostname,
                            'port': parsed.port, 'password': parsed.username, 'udp': True}
                  sni = q.get('sni') or q.get('peer')
                  if sni:
                      proxy['sni'] = sni
                  if q.get('allowInsecure') == '1' or q.get('insecure') == '1':
                      proxy['skip-cert-verify'] = True
                  net = q.get('type', 'tcp')
                  if net == 'ws':
                      proxy['network'] = 'ws'
                      proxy['ws-opts'] = {'path': unquote(q.get('path', '/')),
                                           'headers': {'Host': q.get('host')} if q.get('host') else {}}
                  elif net == 'grpc':
                      proxy['network'] = 'grpc'
                      proxy['grpc-opts'] = {'grpc-service-name': q.get('serviceName', '')}
                  return proxy
              except Exception:
                  return None

          def ss_to_proxy(link, used_names):
              try:
                  parsed, q, frag = parse_uri_style(link)
                  method = password = None
                  host, port = parsed.hostname, parsed.port
                  if parsed.username and host and port:
                      try:
                          userinfo = b64_pad_decode(unquote(parsed.username)).decode('utf-8', errors='ignore')
                          method, password = userinfo.split(':', 1)
                      except Exception:
                          if ':' in unquote(parsed.username):
                              method, password = unquote(parsed.username).split(':', 1)
                  if not (method and password and host and port):
                      body = link[len('ss://'):].split('#')[0]
                      decoded = b64_pad_decode(body).decode('utf-8', errors='ignore')
                      methodpass, hostport = decoded.rsplit('@', 1)
                      method, password = methodpass.split(':', 1)
                      host, port = hostport.split(':')
                      port = int(port)
                  if not (method and password and host and port):
                      return None
                  name = safe_name(frag or 'ss', used_names)
                  return {'name': name, 'type': 'ss', 'server': host, 'port': int(port),
                          'cipher': method, 'password': password, 'udp': True}
              except Exception:
                  return None

          def hysteria2_to_proxy(link, used_names):
              try:
                  parsed, q, frag = parse_uri_style(link)
                  if not (parsed.hostname and parsed.port):
                      return None
                  name = safe_name(frag or 'hysteria2', used_names)
                  proxy = {'name': name, 'type': 'hysteria2', 'server': parsed.hostname,
                            'port': parsed.port,
                            'password': unquote(parsed.username) if parsed.username else q.get('auth', ''),
                            'udp': True}
                  sni = q.get('sni') or q.get('peer')
                  if sni:
                      proxy['sni'] = sni
                  if q.get('insecure') == '1':
                      proxy['skip-cert-verify'] = True
                  if q.get('obfs'):
                      proxy['obfs'] = q.get('obfs')
                      proxy['obfs-password'] = q.get('obfs-password', '')
                  return proxy
              except Exception:
                  return None

          def tuic_to_proxy(link, used_names):
              try:
                  parsed, q, frag = parse_uri_style(link)
                  if not (parsed.hostname and parsed.port):
                      return None
                  name = safe_name(frag or 'tuic', used_names)
                  proxy = {'name': name, 'type': 'tuic', 'server': parsed.hostname,
                            'port': parsed.port, 'udp': True}
                  if parsed.username and parsed.password:
                      proxy['uuid'], proxy['password'] = parsed.username, parsed.password
                  else:
                      proxy['uuid'] = parsed.username or q.get('uuid', '')
                      proxy['password'] = q.get('password', '')
                  if q.get('sni'):
                      proxy['sni'] = q.get('sni')
                  if q.get('alpn'):
                      proxy['alpn'] = [q.get('alpn')]
                  if q.get('allow_insecure') == '1':
                      proxy['skip-cert-verify'] = True
                  return proxy
              except Exception:
                  return None

          def link_to_clash_proxy(link, used_names):
              if link.startswith('vmess://'):
                  return vmess_to_proxy(link, used_names)
              if link.startswith('vless://'):
                  return vless_to_proxy(link, used_names)
              if link.startswith('trojan://'):
                  return trojan_to_proxy(link, used_names)
              if link.startswith('ss://'):
                  return ss_to_proxy(link, used_names)
              if link.startswith('hysteria2://') or link.startswith('hy2://'):
                  return hysteria2_to_proxy(link, used_names)
              if link.startswith('tuic://'):
                  return tuic_to_proxy(link, used_names)
              return None

          # ---------- 主逻辑 ----------

          def main():
              urls = [u.strip() for u in os.getenv('SUBS_URLS', '').splitlines() if u.strip()]
              all_nodes = []
              node_count = {}

              print(f"发现 {len(urls)} 个订阅链接\n")

              # 并发下载所有订阅，避免一个慢/挂的链接拖死全部
              with ThreadPoolExecutor(max_workers=min(20, max(1, len(urls)))) as pool:
                  raw_results = list(pool.map(fetch_url, urls))

              for url, raw in zip(urls, raw_results):
                  if raw:
                      content = decode_content(raw)
                      nodes = [line.strip() for line in content.splitlines()
                               if line.strip() and any(line.strip().startswith(p)
                               for p in ['vmess://', 'vless://', 'trojan://', 'ss://', 'hysteria2://', 'hy2://', 'tuic://'])]
                      all_nodes.extend(nodes)
                      node_count[url] = len(nodes)
                      print(f"   → {url} 获取到 {len(nodes)} 个节点")

              unique_nodes = list(dict.fromkeys(all_nodes))
              print(f"\n✅ 总聚合: {len(all_nodes)} 个，链接去重后: {len(unique_nodes)} 个节点")

              with open('all_nodes.txt', 'w') as f:
                  f.write('\n'.join(unique_nodes))

              # 按 host:port 分组（同一服务器测一次即可），同时构建 link -> (host, port) 映射
              host_port_map = {}     # link -> (host, port)
              group_to_links = {}    # (host, port) -> [link, link, ...]
              for link in unique_nodes:
                  host, port = get_host_port(link)
                  if not host or not port:
                      continue
                  key = (host.lower(), port)
                  host_port_map[link] = key
                  group_to_links.setdefault(key, []).append(link)

              unique_servers = list(group_to_links.keys())
              print(f"✅ 唯一服务器(host:port)数量: {len(unique_servers)}")

              # 服务器数量过多时，随机抽样一部分测速，速度优先
              servers_to_test = unique_servers
              if len(unique_servers) > MAX_UNIQUE_TO_TEST:
                  random.shuffle(unique_servers)
                  servers_to_test = unique_servers[:MAX_UNIQUE_TO_TEST]
                  print(f"⚠️ 唯一服务器过多，随机抽样 {MAX_UNIQUE_TO_TEST} 个进行测速（其余作为候补）")

              best_nodes = []

              if servers_to_test:
                  print(f"\n🚀 开始异步 TCP 连通性/延迟测速（并发 {MAX_CONCURRENCY}，超时 {CONNECT_TIMEOUT}s）...")
                  t0 = time.time()
                  delays = asyncio.run(test_all(servers_to_test))
                  print(f"✅ 测速完成，用时 {round(time.time() - t0, 1)} 秒")

                  server_delay = [(servers_to_test[i], delays[i]) for i in range(len(servers_to_test)) if delays[i] is not None]
                  server_delay.sort(key=lambda x: x[1])
                  print(f"✅ 存活服务器: {len(server_delay)}/{len(servers_to_test)}")

                  # 按延迟从小到大，取每个服务器下的第一个节点链接，凑够 TOP_N
                  seen_links = set()
                  for server_key, delay in server_delay:
                      for link in group_to_links[server_key]:
                          if link not in seen_links:
                              best_nodes.append(link)
                              seen_links.add(link)
                              break
                      if len(best_nodes) >= TOP_N:
                          break

                  # 不够 TOP_N 就用其余未测试/未测通的节点补足
                  if len(best_nodes) < TOP_N:
                      for link in unique_nodes:
                          if len(best_nodes) >= TOP_N:
                              break
                          if link not in seen_links:
                              best_nodes.append(link)
                              seen_links.add(link)
              else:
                  print("没有可解析出 host:port 的节点，直接取前 TOP_N 个")
                  best_nodes = unique_nodes[:TOP_N]

              # ---------- 输出 txt / base64 订阅 ----------

              combined = '\n'.join(best_nodes)
              encoded = base64.b64encode(combined.encode('utf-8')).decode('utf-8')

              with open('sub.txt', 'w') as f:
                  f.write(encoded)
              with open('sub_plain.txt', 'w') as f:
                  f.write(combined)

              # ---------- 输出 Clash YAML 订阅 ----------

              used_names = set()
              proxies = []
              for link in best_nodes:
                  p = link_to_clash_proxy(link, used_names)
                  if p:
                      proxies.append(p)

              proxy_names = [p['name'] for p in proxies]

              clash_config = {
                  'mixed-port': 7890,
                  'allow-lan': False,
                  'mode': 'rule',
                  'log-level': 'info',
                  'proxies': proxies,
                  'proxy-groups': [
                      {'name': '🚀 节点选择', 'type': 'select',
                       'proxies': ['♻️ 自动选择', 'DIRECT'] + proxy_names},
                      {'name': '♻️ 自动选择', 'type': 'url-test',
                       'url': 'https://www.gstatic.com/generate_204',
                       'interval': 300, 'proxies': proxy_names},
                  ],
                  'rules': ['MATCH,🚀 节点选择'],
              }

              with open('sub.yaml', 'w', encoding='utf-8') as f:
                  yaml.dump(clash_config, f, allow_unicode=True, sort_keys=False)

              print(f"\n✅ 最终输出 {len(best_nodes)} 个最佳节点")
              print(f"✅ 其中 {len(proxies)} 个成功转换为 Clash YAML 格式")

          if __name__ == '__main__':
              main()
          EOF

          python3 main.py

      - name: 提交更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -f sub.txt ] && [ -f sub.yaml ]; then
            git add sub.txt sub_plain.txt sub.yaml
            if git diff --cached --quiet; then
              echo "没有新变化"
            else
              git commit -m "Auto update Best 100 nodes $(date '+%Y-%m-%d %H:%M:%S UTC')"
              git push
              echo "✅ 成功推送！"
            fi
          else
            echo "❌ 未生成订阅文件"
            exit 1
          fi
