mixed-port: 7890
allow-lan: true
mode: rule
log-level: warning
ipv6: false
proxies: []
proxy-providers:
  AutoNodes:
    type: http
    url: https://raw.githubusercontent.com/zhuiyilu/jiedian3/main/sub.txt
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
proxy-groups:
- name: ♻️ 自动选择
  type: url-test
  use:
  - AutoNodes
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: 🔄 手动选择
  type: select
  use:
  - AutoNodes
rules:
- MATCH,♻️ 自动选择
